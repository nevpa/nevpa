<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMS 3D Responsive Konfigüratör</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root { --accent: #ffcc00; --bg: #0d1117; --sidebar-bg: rgba(22, 27, 34, 0.85); }
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #f0f6fc; overflow: hidden;}

        /* --- SOL MENÜ (NAVİGASYON) --- */
        .sidebar-left { width: 280px; background: var(--sidebar-bg); backdrop-filter: blur(10px); padding: 30px; display: flex; flex-direction: column; border-right: 1px solid rgba(139, 148, 158, 0.1); z-index: 10; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .logo-container { margin-bottom: 40px; text-align: center; }
        .logo-container img { max-width: 180px; height: auto; }
        
        .action-group { margin-bottom: 30px; }
        .action-group-title { font-size: 11px; text-transform: uppercase; color: #8b949e; letter-spacing: 1.5px; margin-bottom: 12px; font-weight: 600; padding-left: 5px; }
        
        .action-btn, .module-btn { display: flex; align-items: center; background-color: transparent; color: #c9d1d9; border: 1px solid rgba(139, 148, 158, 0.2); padding: 12px 15px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; text-decoration: none; font-weight: 500; font-size: 14px; width: 100%; box-sizing: border-box;}
        .action-btn:hover, .module-btn:hover { border-color: var(--accent); color: #ffffff; background-color: rgba(255, 204, 0, 0.05); }
        .active-nav, .active { border-color: var(--accent) !important; color: #ffffff !important; background-color: rgba(255, 204, 0, 0.1) !important; }

        /* --- ANA EKRAN (3D) --- */
        .main-area { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at center, #21262d 0%, #0d1117 100%); z-index: 1;}
        .brand-title-3d { margin-top: 30px; font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; text-align: center; background: linear-gradient(180deg, #ffffff 0%, #8b949e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 1px solid rgba(139, 148, 158, 0.2); padding-bottom: 10px; width: 80%; z-index: 2; pointer-events: none;}
        .brand-title-3d span { display: block; font-size: 14px; color: var(--accent); text-transform: none; font-weight: 600; margin-bottom: 5px; -webkit-text-fill-color: var(--accent);}
        .model-area { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;}

        /* --- SAĞ MENÜ (BİLEŞENLER) --- */
        .sidebar-right { width: 280px; background: var(--sidebar-bg); backdrop-filter: blur(10px); padding: 30px 20px; display: flex; flex-direction: column; border-left: 1px solid rgba(139, 148, 158, 0.1); z-index: 10; box-shadow: -5px 0 15px rgba(0,0,0,0.5); overflow-y: auto;}
        .panel-header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(139, 148, 158, 0.2); padding-bottom: 10px;}
        .panel-title { font-size: 14px; font-weight: 700; color: #f0f6fc; text-transform: uppercase;}
        
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; background-color: #484f58; margin-left: auto;}
        .active .status-indicator { background-color: var(--accent); box-shadow: 0 0 8px var(--accent);}
        .show-all-btn { border: 1px dashed rgba(139, 148, 158, 0.5); margin-bottom: 20px !important; }

        /* --- MODAL PENCERELER --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #161b22; margin: 5% auto; padding: 25px; border: 1px solid var(--accent); width: 70%; border-radius: 12px; position: relative; }
        .close-modal { color: #8b949e; position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; }
        .close-modal:hover { color: var(--accent); }
        iframe { width: 100%; height: 400px; border: none; border-radius: 8px; }

        /* --- MOBİL UYUMLULUK (QUERY) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar-left, .sidebar-right { 
                width: 100%; height: auto; padding: 10px; border: none; 
                flex-direction: row; overflow-x: auto; white-space: nowrap; 
            }
            .sidebar-left { order: 1; border-bottom: 1px solid rgba(139, 148, 158, 0.2); }
            .sidebar-right { order: 3; position: fixed; bottom: 0; border-top: 1px solid var(--accent); background: #0d1117; }
            .main-area { order: 2; height: 65vh; width: 100%; }
            .logo-container, .action-group-title, .panel-header { display: none; }
            .action-group { margin-bottom: 0; display: flex; gap: 8px; }
            .action-btn, .module-btn { width: auto; margin-bottom: 0; margin-right: 5px; flex-shrink: 0; padding: 10px 15px; }
            .brand-title-3d { font-size: 20px; margin-top: 15px; }
            .modal-content { width: 90%; margin: 20% auto; }
        }
    </style>
</head>
<body>

    <div class="sidebar-left">
        <div class="logo-container"><img src="logo.png" alt="Nevpa Logo"></div>
        
        <div class="action-group">
            <div class="action-group-title">İncele</div>
            <button class="action-btn" onclick="openModal('videoModal')">▶ Video</button>
            <button class="action-btn active-nav">⚙️ Konfigüratör</button>
            <a href="https://nevpa.com.tr" target="_blank" class="action-btn">🌐 Nevpa Web</a>
        </div>

        <div class="action-group">
            <div class="action-group-title">Bilgi</div>
            <button class="action-btn" onclick="openModal('pdfModal')">📐 Teknik Çizim</button>
            <a href="https://nevpa.com.tr/iletisim" target="_blank" class="action-btn">📞 İletişim</a>
        </div>
    </div>

    <div class="main-area">
        <div class="brand-title-3d"><span>YENİ NESİL MODÜLER SİSTEM</span>DİNAMİK KONFİGÜRATÖR</div>
        <div class="model-area">
            <model-viewer src="televre.glb" auto-rotate camera-controls shadow-intensity="1" environment-image="neutral" exposure="1" style="width: 100%; height: 100%; outline: none;"></model-viewer>
        </div>
    </div>

    <div class="sidebar-right">
        <div class="panel-header"><div class="panel-title">BİLEŞENLER</div></div>
        <button class="module-btn show-all-btn active" id="showAllBtn">TÜMÜNÜ GÖSTER <span class="status-indicator"></span></button>
        <button class="module-btn" data-model="alt_televre.glb">Alt Televre <span class="status-indicator"></span></button>
        <button class="module-btn" data-model="kros.glb">Televre Krosu <span class="status-indicator"></span></button>
        <button class="module-btn" data-model="baba.glb">Taşıyıcı Baba <span class="status-indicator"></span></button>
        <button class="module-btn" data-model="kapak.glb">Alüminyum Kapak <span class="status-indicator"></span></button>
        <button class="module-btn" data-model="camurluk.glb">Çamurluk <span class="status-indicator"></span></button>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('videoModal')">&times;</span>
            <h3 style="color:var(--accent); margin-top:0;">Tanıtım Videosu</h3>
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
    </div>

    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('pdfModal')">&times;</span>
            <h3 style="color:var(--accent); margin-top:0;">Teknik Çizim & Katalog</h3>
            <div style="height: 300px; border: 1px dashed #444; display:flex; align-items:center; justify-content:center; color:#8b949e;">PDF Önizleme Alanı</div>
        </div>
    </div>

    <script>
        // Modal Fonksiyonları
        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        window.onclick = function(e) { if(e.target.className==='modal') e.target.style.display="none"; }

        // Parça Seçim Mantığı
        const moduleBtns = document.querySelectorAll('.module-btn');
        const modelViewer = document.querySelector('model-viewer');

        moduleBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                moduleBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                if (this.id === 'showAllBtn') { modelViewer.src = 'televre.glb'; } 
                else {
                    const modelName = this.getAttribute('data-model');
                    if(modelName) { modelViewer.src = modelName; }
                }
            });
        });
    </script>
</body>
</html>
